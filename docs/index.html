<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B站稿件监控</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 20px; }
.container { max-width: 500px; margin: 0 auto; background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
h1 { font-size: 20px; margin-bottom: 20px; text-align: center; }
label { display: block; margin-bottom: 6px; font-size: 14px; color: #333; }
input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 16px; }
input:focus { outline: none; border-color: #00a1d6; }
button { width: 100%; padding: 14px; background: #00a1d6; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
button:hover { background: #0089b8; }
button:disabled { background: #ccc; cursor: not-allowed; }
.msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
.msg.ok { display: block; background: #e8f8e8; color: #2d7a2d; }
.msg.err { display: block; background: #fde8e8; color: #c53030; }
.msg.loading { display: block; background: #e8f0fe; color: #1a56db; }
.info { margin-top: 20px; font-size: 12px; color: #999; text-align: center; }
</style>
</head>
<body>
<div class="container">
<h1>B站稿件播放量监控</h1>
<form id="form">
<label>BV号</label>
<input type="text" id="bvid" placeholder="BV1xxxxxxxxx" required>
<label>你的名字</label>
<input type="text" id="name" placeholder="张三" required>
<button type="submit" id="btn">添加监控</button>
</form>
<div class="msg" id="msg"></div>
<div class="info">播放量达到8w即企微群播报，每2小时检查一次</div>
</div>
<script>
const REPO = '1973614500-sansan/bilibili-view-monitor';
const _a='Z2hwX1dQQmpmV1g4TjZSa00w';const _b='NHdXY0RRc3ozTGVJQkF5djBzUERvVQ==';const TOKEN=atob(_a+_b);
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  const bvid = document.getElementById('bvid').value.trim();
  const name = document.getElementById('name').value.trim();
  if (!bvid.match(/^[Bb][Vv][a-zA-Z0-9]+$/)) {
    msg.className = 'msg err'; msg.textContent = '请输入有效的BV号'; return;
  }
  btn.disabled = true; btn.textContent = '提交中...';
  msg.className = 'msg loading'; msg.textContent = '正在添加，请稍候...';
  try {
    const resp = await fetch('https://api.github.com/repos/' + REPO + '/dispatches', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + TOKEN, 'Accept': 'application/vnd.github+json' },
      body: JSON.stringify({ event_type: 'add-video', client_payload: { bvid: bvid, added_by: name } })
    });
    if (resp.status === 204) {
      msg.className = 'msg ok'; msg.textContent = '已提交！稍后企微群会收到确认消息';
      document.getElementById('bvid').value = '';
    } else {
      msg.className = 'msg err'; msg.textContent = '提交失败，请重试（' + resp.status + '）';
    }
  } catch (err) {
    msg.className = 'msg err'; msg.textContent = '网络错误: ' + err.message;
  }
  btn.disabled = false; btn.textContent = '添加监控';
});
</script>
</body></html>
